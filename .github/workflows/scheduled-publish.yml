name: Scheduled Publish Trigger

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "Missing GitHub secret: SITE_URL"
            exit 1
          fi

      - name: Call publish cron endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          URL="${SITE_URL%/}/api/cron/publish"
          echo "Target URL host: $(echo "$URL" | sed -E 's#(https?://[^/]+).*#\1#')"
          if [ -n "${CRON_SECRET:-}" ]; then
            response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" "$URL" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "User-Agent: github-actions-cron/1.0")
          else
            response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" "$URL" \
              -H "User-Agent: github-actions-cron/1.0")
          fi

          echo "$response"
          status=$(echo "$response" | awk -F: '/HTTP_STATUS/{print $2}' | tail -n1)
          if [ -z "$status" ] || [ "$status" -ge 400 ]; then
            echo "Publish cron request failed with status: ${status:-unknown}"
            exit 1
          fi
