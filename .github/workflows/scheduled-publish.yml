name: Scheduled Publish Trigger

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "Missing GitHub secret: SITE_URL"
            exit 1
          fi

      - name: Call publish cron endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          URL="${SITE_URL%/}/api/cron/publish"
          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS "$URL" -H "Authorization: Bearer $CRON_SECRET"
          else
            curl -fsS "$URL"
          fi
